<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Page Not Found | CoreCloud Procurement</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="stylesheet" href="assets/css/marketplace.css" />
  <link rel="icon" href="assets/images/corecloud-neon-logo.png" />
  <style>
    :root {
      --bg: #020617;
      --panel: rgba(2, 6, 23, 0.45);
      --border: rgba(212, 175, 55, 0.25);
      --gold: #d4af37;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #0f172a 0%, #020617 55%, #000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 7vw;
      border-bottom: 1px solid rgba(212, 175, 55, 0.08);
      backdrop-filter: blur(14px);
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .logo-wrap img {
      height: 46px;
    }
    .logo-text {
      font-weight: 600;
      letter-spacing: .02em;
    }
    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 6vh 7vw 7vh;
    }
    .card {
      background: radial-gradient(circle, rgba(4,6,15,.65) 0%, rgba(2,6,23,.25) 100%);
      border: 1px solid rgba(212, 175, 55, 0.05);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 540px;
      text-align: center;
      box-shadow: 0 14px 35px rgba(0,0,0,.35);
    }
    .code {
      font-size: clamp(4rem, 9vw, 4.6rem);
      font-weight: 700;
      letter-spacing: -.04em;
      color: var(--gold);
      line-height: .95;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: .6rem;
    }
    p {
      color: var(--muted);
      margin-bottom: 1.4rem;
    }
    .btn-row {
      display: flex;
      gap: .8rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: .6rem 1.35rem;
      border-radius: 999px;
      border: 1px solid rgba(212,175,55,.4);
      background: linear-gradient(135deg,#d4af37 0%,#816219 100%);
      color: #020617;
      font-weight: 600;
      text-decoration: none;
      font-size: .9rem;
    }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(212,175,55,.18);
    }
    footer {
      text-align: center;
      padding: 1.4rem 7vw 1.8rem;
      font-size: .78rem;
      color: rgba(226,232,240,.55);
    }
    @media (max-width: 580px) {
      header {
        padding-inline: 1.4rem;
      }
      .card {
        padding: 32px 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-wrap">
      <img src="assets/images/corecloud-neon-logo.png" alt="CoreCloud Procurement" />
      <div class="logo-text">CoreCloud Procurement</div>
    </div>
    <nav>
      <a href="index.html" style="color:#e2e8f0;text-decoration:none;font-size:.85rem;">Back to Procurement</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <div class="code">404</div>
      <h1>That page isn’t in stock.</h1>
      <p>The link is broken or the requested procurement page has moved. Return to CoreCloud Procurement or browse the current business technology bundles.</p>
      <div class="btn-row">
        <a class="btn" href="index.html">Go to Procurement</a>
        <a class="btn btn-secondary" href="index.html#featured">Browse bundles</a>
      </div>
    </div>
  </main>

  <footer>
    © <span id="year"></span> CoreCloud (Pty) Ltd. All rights reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
